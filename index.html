<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Ongkir Cileunyi</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
    .result {
      margin-top: 15px;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Cek Ongkir</h2>
  <p><b>Asal:</b> Cileunyi (Bandung)</p>

  <!-- Kota Tujuan -->
  <select id="kota">
    <option value="">-- Pilih Kota Tujuan --</option>
    <option value="CGK">Jakarta</option>
    <option value="SUB">Surabaya</option>
    <option value="SMG">Semarang</option>
    <option value="YOG">Yogyakarta</option>
    <option value="DPS">Denpasar</option>
    <option value="BDO">Bandung</option>
  </select>

  <!-- Berat -->
  <input id="berat" type="number" placeholder="Berat (gram)">

  <!-- Kurir -->
  <select id="kurir">
    <option value="jne">JNE</option>
    <option value="jnt">J&T</option>
    <option value="sicepat">SiCepat</option>
  </select>

  <button onclick="cekOngkir()">Cek Ongkir</button>

  <div class="result" id="hasil">
    Hasil ongkir akan muncul di sini
  </div>
</div>

<script>
async function cekOngkir() {
  const tujuan = document.getElementById("kota").value;
  const berat = document.getElementById("berat").value;
  const kurir = document.getElementById("kurir").value;

  console.log("KIRIM:", tujuan, berat, kurir);

  try {
    const res = await fetch("https://orna.ornamenku00.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        destination: tujuan,
        weight: parseInt(berat),
        courier: kurir
      })
    });

    console.log("STATUS:", res.status);

    const text = await res.text();
    console.log("RESPON:", text);

    document.getElementById("hasil").innerText = text;

  } catch (err) {
    console.log("ERROR:", err);
    document.getElementById("hasil").innerText =
      "Error: " + err.message;
  }
}
</script>

</body>
</html>
